<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creative Portfolio</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body { font-family: 'Arial', sans-serif; margin: 0; padding: 0; }
        .navbar { position: sticky; top: 0; background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); padding: 1rem; display: flex; justify-content: space-around; font-weight: bold; }
        .hero { height: 100vh; display: flex; justify-content: center; align-items: center; background: linear-gradient(to bottom right, #6b6eac, #c4c4d8); color: white; text-align: center; }
        .projects, .services, .footer { padding: 2rem; }
        .project-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 1rem; }
        .project-card { background: rgba(255, 255, 255, 0.3); backdrop-filter: blur(10px); padding: 1rem; border-radius: 10px; transition: transform 0.2s; }
        .project-card:hover { transform: scale(1.05); }
        .footer { background: rgba(255, 255, 255, 0.1); text-align: center; }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="#hero">Home</a>
        <a href="#projects">Projects</a>
        <a href="#services">Services</a>
        <a href="#contact">Contact</a>
    </nav>
    <section class="hero" id="hero">
        <h1>Welcome to My Creative Portfolio</h1>
        <p>Crafting digital experiences that inspire.</p>
    </section>
    <section class="projects" id="projects">
        <h2>My Projects</h2>
        <div class="project-grid">
            <div class="project-card">Project 1</div>
            <div class="project-card">Project 2</div>
            <div class="project-card">Project 3</div>
            <div class="project-card">Project 4</div>
        </div>
    </section>
    <section class="services" id="services">
        <h2>Services</h2>
        <p>Web Design, Development, SEO Optimization.</p>
    </section>
    <footer class="footer">
        <h2>Get In Touch!</h2>
        <p>Email: contact@example.com</p>
    </footer>
</body>
</html>
